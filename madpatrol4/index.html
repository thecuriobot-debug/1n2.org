<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mad Patrol 4</title>
  <style>
    :root {
      --bg: #07090f;
      --gold: #f7931a;
      --blue: #44c1ff;
      --hud: #d9f0ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, #1a2040 0%, #0a0d1c 55%, #050710 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
    }
    #wrap {
      width: min(98vw, 980px);
      display: flex; flex-direction: column; gap: 6px;
    }
    #game {
      width: 100%; height: auto;
      display: block;
      border: 6px solid #3a4d70;
      border-top-color: #8fa8d0;
      border-left-color: #8fa8d0;
      border-right-color: #1e2d48;
      border-bottom-color: #1e2d48;
      image-rendering: pixelated;
      background: var(--bg);
      box-shadow: 0 0 0 4px #111d32, 0 0 40px rgba(0,0,0,0.9), 0 0 80px rgba(68,193,255,0.08);
    }
    #hint {
      color: var(--hud);
      font-size: 12px;
      opacity: 0.88;
      background: rgba(8,14,28,0.9);
      border: 1px solid rgba(140,180,230,0.4);
      padding: 5px 10px;
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540" aria-label="Mad Patrol 4"></canvas>
    <div id="hint">MAD PATROL 4 — Arrows: Move/Aim · Up: Jump · Space: Fire · Down: Duck · G: Grapple · M: Music · Esc: Pause · F: Fullscreen</div>
  </div>
  <script src="main.js"></script>
</body>
</html>
