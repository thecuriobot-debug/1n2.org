<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurioCharts — Simple Demo 🦝</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#06080f;--bg-card:#0c1021;--bg-card-hover:#111730;
  --border:#1a2040;--border-hover:#2a3560;
  --text-primary:#e8ecf4;--text-secondary:#8892b0;--text-muted:#4a5578;
  --accent:#00d4aa;--accent-dim:#00d4aa33;--accent-glow:#00d4aa22;
  --gradient-accent:linear-gradient(135deg,#00d4aa,#00b4d8);
  --gradient-hero:linear-gradient(180deg,#0a0e1a 0%,#06080f 100%);
  --font-display:'Outfit',sans-serif;--font-mono:'Space Mono',monospace;
  --radius:12px;--radius-lg:20px;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-display);background:var(--bg-deep);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
.hero{text-align:center;padding:80px 20px 60px;background:var(--gradient-hero)}
.hero h1{font-size:3rem;font-weight:900;margin-bottom:20px}
.hero h1 span{background:var(--gradient-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.2rem;color:var(--text-secondary);max-width:600px;margin:0 auto 40px}
.hero a{color:var(--accent);text-decoration:underline}
.loading{text-align:center;padding:60px;color:var(--text-muted);font-size:1.2rem}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.container{max-width:1400px;margin:0 auto;padding:0 24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:40px}
.nft-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .35s;text-decoration:none;color:inherit;display:block}
.nft-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 20px 40px #00000040,0 0 40px var(--accent-glow)}
.nft-card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg-deep);display:block}
.nft-card-body{padding:16px 20px 20px}
.nft-card-name{font-weight:700;font-size:1rem;margin-bottom:8px}
.nft-stat{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem}
.nft-stat-label{color:var(--text-muted)}
.nft-stat-val{font-family:var(--font-mono);color:var(--accent);font-weight:600}
</style>
</head>
<body>
<section class="hero">
<h1>Curio<span>Charts</span> 🦝</h1>
<p>Simple demo loading data from <code>data.json</code><br>
<small><a href="index.html">View Full Dashboard →</a></small></p>
</section>

<div class="container">
<div class="loading" id="loading">
<div class="spinner"></div>Loading Curio Cards data...
</div>
<div class="cards-grid" id="cards-grid"></div>
</div>

<script>
const ETH = v => v === null || v === undefined ? '—' : `Ξ${v < 1 ? v.toPrecision(3) : v.toLocaleString('en', { maximumFractionDigits: 2 })}`;
const NUM = v => v === null ? '—' : v.toLocaleString('en');

async function loadData() {
  try {
    const response = await fetch('data.json');
    if (!response.ok) throw new Error('Failed to load data');
    const DATA = await response.json();
    
    document.getElementById('loading').style.display = 'none';
    
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = DATA.cards.map(card => `
      <a href="https://opensea.io/item/ethereum/${DATA.collection.contract}/${card.id}" class="nft-card">
        <img class="nft-card-img" src="${card.img}" alt="${card.name}" loading="lazy">
        <div class="nft-card-body">
          <div class="nft-card-name">${card.name} #${card.id}</div>
          <div class="nft-stat">
            <span class="nft-stat-label">Floor</span>
            <span class="nft-stat-val">${card.floor ? ETH(card.floor) : 'No listing'}</span>
          </div>
          <div class="nft-stat">
            <span class="nft-stat-label">Last Sale</span>
            <span class="nft-stat-val">${ETH(card.last_sale)}</span>
          </div>
          <div class="nft-stat">
            <span class="nft-stat-label">Supply</span>
            <span class="nft-stat-val">${NUM(card.supply)}</span>
          </div>
          <div class="nft-stat">
            <span class="nft-stat-label">Artist</span>
            <span class="nft-stat-val" style="color:var(--text-secondary)">${card.artist}</span>
          </div>
        </div>
      </a>
    `).join('');
    
    console.log('✅ Loaded', DATA.cards.length, 'cards');
    console.log('📅 Data from:', DATA.fetched_at);
    console.log('🏛️ Collection floor:', ETH(DATA.collection.floor));
    
  } catch (error) {
    document.getElementById('loading').innerHTML = `
      <div style="color:var(--red)">
        ❌ Error loading data: ${error.message}<br>
        <small>Make sure data.json exists in the same directory</small>
      </div>
    `;
    console.error('Load error:', error);
  }
}

loadData();
</script>
</body>
</html>
