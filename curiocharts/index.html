<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurioCharts — Floor Prices & Market Data</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--card:#0e1118;--border:#1e2030;--text:#d0d2dc;--muted:#555770;--accent:#f0a030;--green:#3dd68c;--red:#e85454;--blue:#4da8da;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent);text-decoration:none}a:hover{color:#fff}
.hdr{background:rgba(6,8,16,.95);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.hdr h1{font-size:1.15rem;font-weight:800;letter-spacing:1px;white-space:nowrap}h1 span{color:var(--accent)}
.nav-links{display:flex;gap:10px;font-size:.75rem;margin-left:auto;white-space:nowrap}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.ov-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.ov-stat .n{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent)}
.ov-stat .l{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.src{font-size:.6rem;color:var(--muted);text-align:right;margin-bottom:8px}
.src b{color:var(--green)}
.sort-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sort-btn{padding:4px 10px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:'Outfit',sans-serif;transition:.15s}
.sort-btn:hover,.sort-btn.on{border-color:var(--accent);color:var(--accent)}.sort-btn.on{background:rgba(240,160,48,.08)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer;display:block;color:inherit}
.cc:hover{border-color:var(--accent);transform:translateY(-2px)}
.cc-img{height:140px;background:#111218;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cc-img img{height:100%;object-fit:contain}
.cc-body{padding:10px}
.cc-name{font-size:.85rem;font-weight:700;margin-bottom:4px}
.cc-floor{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--accent)}
.cc-row{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:3px}
.cc-row .v{font-family:'JetBrains Mono',monospace}
.cc-bar{height:3px;border-radius:2px;margin-top:6px;background:var(--border);overflow:hidden}
.cc-bar .fill{height:100%;border-radius:2px}
.signal{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.6rem;font-weight:700;text-transform:uppercase;margin-left:4px}
.signal.buy{background:rgba(61,214,140,.12);color:var(--green)}.signal.sell{background:rgba(232,84,84,.12);color:var(--red)}.signal.hold{background:rgba(85,87,112,.12);color:var(--muted)}
@media(max-width:600px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.cc-img{height:110px}.hdr{flex-wrap:wrap}}
.curio-nav{background:rgba(6,8,16,.97);backdrop-filter:blur(10px);border-bottom:1px solid #1e2030;padding:8px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;font-family:'JetBrains Mono','Outfit',system-ui,sans-serif}
.curio-nav-brand{font-size:1.15rem;font-weight:800;letter-spacing:1px;color:#d0d2dc;white-space:nowrap;text-decoration:none}
.curio-nav-brand span{color:#f0a030}
.curio-nav-links{display:flex;gap:12px;font-size:.75rem;margin-left:auto;white-space:nowrap;align-items:center}
.curio-nav-links a{color:#f0a030;text-decoration:none}.curio-nav-links a:hover{color:#fff}
.curio-nav-current{color:#444860;font-size:.75rem;cursor:default}
.curio-nav-pulse{display:inline-block;width:7px;height:7px;background:#3dd68c;border-radius:50%;margin-right:5px;animation:blink 2s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="curio-nav"><a href="/" class="curio-nav-brand">📊 Curio<span>Charts</span></a><div class="curio-nav-links"><a href="/curio-quant/">CurioQuant</a><a href="/curio-quant/community.html">CurioCommunity</a><span class="curio-nav-current">CurioCharts</span><a href="/curio-map/">CurioMap</a><a href="/curio-wiki/">CurioWiki</a></div></div>
<div class="wrap">
  <div class="src">Data from <b>Data Labs</b> · Updated <span id="updated"></span></div>
  <div class="overview" id="overview"></div>
  <div class="sort-bar" id="sortbar"></div>
  <div class="card-grid" id="grid"></div>
</div>
<script src="/curio-quant/cards-data.js"></script>
<script>
let DL=null, sortKey='id';
const ids=Object.keys(CARDS).sort((a,b)=>(a==='17b'?17.5:+a)-(b==='17b'?17.5:+b));

function getExt(id){return['21','22'].includes(id)?'png':['23','30'].includes(id)?'gif':'jpg';}

async function init(){
  try{DL=await(await fetch('datalabs.json')).json();}catch(e){DL=null;}
  document.getElementById('updated').textContent=DL?.updated||'demo data';
  buildOverview();buildSortBar();renderGrid();
}

function buildOverview(){
  const s=[];
  if(DL){
    s.push({n:DL.collection_floor_eth+' Ξ',l:'Collection Floor'});
    s.push({n:DL.total_owners?.toLocaleString()||'—',l:'Unique Owners'});
    s.push({n:DL.total_sales||'—',l:'Total Sales'});
    s.push({n:DL.total_transfers?.toLocaleString()||'—',l:'Transfers'});
    s.push({n:DL.cards?.length||30,l:'Cards'});
    s.push({n:DL.price_history?.length||'—',l:'Days Tracked'});
  } else {
    const floors=ids.map(id=>CARDS[id].floor);
    s.push({n:(floors.reduce((a,b)=>a+b,0)/floors.length).toFixed(3)+' Ξ',l:'Avg Floor'});
    s.push({n:ids.reduce((a,id)=>a+CARDS[id].holders,0).toLocaleString(),l:'Total Holders'});
    s.push({n:ids.length,l:'Cards'});
  }
  document.getElementById('overview').innerHTML=s.map(x=>`<div class="ov-stat"><div class="n">${x.n}</div><div class="l">${x.l}</div></div>`).join('');
}

function buildSortBar(){
  const sorts=[{k:'id',l:'# Number'},{k:'floor',l:'Floor ↑'},{k:'floor_d',l:'Floor ↓'},{k:'owners',l:'Owners'},{k:'supply',l:'Supply'},{k:'name',l:'Name'}];
  document.getElementById('sortbar').innerHTML=sorts.map(s=>
    `<button class="sort-btn${s.k===sortKey?' on':''}" onclick="setSort('${s.k}')">${s.l}</button>`
  ).join('');
}
function setSort(k){sortKey=k;buildSortBar();renderGrid();}

function getDLCard(id){
  if(!DL?.cards) return null;
  const numId=id==='17b'?17:parseInt(id);
  return DL.cards.find(c=>c.id===numId);
}

function sortedIds(){
  const arr=[...ids];
  if(sortKey==='floor') arr.sort((a,b)=>CARDS[a].floor-CARDS[b].floor);
  else if(sortKey==='floor_d') arr.sort((a,b)=>CARDS[b].floor-CARDS[a].floor);
  else if(sortKey==='owners'){
    arr.sort((a,b)=>{
      const da=getDLCard(a), db=getDLCard(b);
      return (db?.owners||CARDS[b].holders)-(da?.owners||CARDS[a].holders);
    });
  }
  else if(sortKey==='supply') arr.sort((a,b)=>CARDS[a].supply-CARDS[b].supply);
  else if(sortKey==='name') arr.sort((a,b)=>CARDS[a].name.localeCompare(CARDS[b].name));
  return arr;
}

function renderGrid(){
  const maxFloor=Math.max(...ids.map(id=>CARDS[id].floor));
  document.getElementById('grid').innerHTML=sortedIds().map(id=>{
    const c=CARDS[id];
    const dl=getDLCard(id);
    const num=id==='17b'?'17':id.padStart(2,'0');
    const ext=getExt(id);
    const barW=Math.max(5,Math.round(c.floor/maxFloor*100));
    const sig=c.floor<c.avg30?'buy':c.floor>c.high*0.8?'sell':'hold';
    const sigLabel=sig==='buy'?'BUY':sig==='sell'?'SELL':'HOLD';
    const owners=dl?dl.owners:c.holders;
    const lastSale=dl?.last_sale_eth?dl.last_sale_eth+' Ξ':'—';
    const salesCount=dl?.sales_count||'—';
    const transfers=dl?.transfers||'—';
    return `<a class="cc" href="/curio-quant/card.html?id=${id}">
      <div class="cc-img"><img src="/curio-quant/img/card-${num}.${ext}" alt="${c.name}" loading="lazy"></div>
      <div class="cc-body">
        <div class="cc-name">#${id} ${c.name} <span class="signal ${sig}">${sigLabel}</span></div>
        <div class="cc-floor">${c.floor} Ξ</div>
        <div class="cc-row"><span>Owners</span><span class="v">${owners.toLocaleString()}</span></div>
        <div class="cc-row"><span>Supply</span><span class="v">${c.supply.toLocaleString()}</span></div>
        <div class="cc-row"><span>Last Sale</span><span class="v">${lastSale}</span></div>
        <div class="cc-row"><span>Sales</span><span class="v">${salesCount}</span></div>
        <div class="cc-row"><span>Transfers</span><span class="v">${transfers}</span></div>
        <div class="cc-bar"><div class="fill" style="width:${barW}%;background:${sig==='buy'?'var(--green)':sig==='sell'?'var(--red)':'var(--accent)'}"></div></div>
      </div></a>`;
  }).join('');
}

init();
</script>
</body></html>
