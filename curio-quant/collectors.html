<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collectors — CurioQuant</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0d10;--card:#141519;--card2:#1a1b21;--border:#2a2b33;--text:#e4e5eb;--muted:#6b6d7a;--accent:#f0a030;--green:#3dd68c;--red:#e85454;--blue:#4da8da}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{color:var(--accent);text-decoration:none}a:hover{color:#fff}
.wrap{max-width:1200px;margin:0 auto;padding:20px 24px}
.back{font-size:.9rem;color:var(--muted);margin-bottom:16px;display:inline-block}
h1{font-size:2rem;font-weight:800;margin-bottom:4px}h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:20px}
.sec-t{font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px}.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .2s,transform .2s;display:block;color:inherit}
.col:hover{border-color:var(--accent);transform:translateY(-2px)}
.col-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.col-name{font-size:1.1rem;font-weight:700}
.col-type{font-size:.62rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;background:rgba(255,255,255,.05)}
.col-group{font-size:.78rem;color:var(--accent);margin-bottom:6px}
.col-desc{font-size:.84rem;color:var(--muted);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.col-stats{display:flex;gap:14px;font-size:.72rem;color:var(--muted)}
.col-stats span{font-family:'JetBrains Mono',monospace}
.mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<script src="cards-data.js"></script>
<div class="wrap">
<a class="back" href="index.html">← Back to CurioQuant</a>
<h1>👤 <span>Collectors</span></h1>
<div class="sub">QuantBot-profiled wallets. Click any collector to see their card binder and full profile.</div>
<div class="sec-t">All Collectors</div>
<div class="grid" id="grid"></div>
</div>
<script>
const typeC={whale:'var(--accent)',flipper:'var(--red)',fan:'var(--blue)',collector:'var(--green)',newbie:'var(--muted)'};
document.getElementById('grid').innerHTML = HOLDERS.map((h,i) => `
<a class="col" href="collector.html?id=${h.id}">
  <div class="col-top"><span class="col-name">${h.name}</span><span class="col-type" style="color:${typeC[h.type]||'var(--muted)'}">${h.type}</span></div>
  <div class="col-group">${h.group}</div>
  <div class="col-desc">${h.style}</div>
  <div class="col-stats"><span>💰 ${h.total_spent}Ξ</span><span>📅 ${h.avg_hold_days}d</span><span>🃏 ${h.cards.length}</span><span class="mono">${h.wallet}</span></div>
</a>`).join('');
</script>
</body></html>
