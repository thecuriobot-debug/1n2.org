<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector Groups — CurioQuant</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0d10;--card:#141519;--card2:#1a1b21;--border:#2a2b33;--text:#e4e5eb;--muted:#6b6d7a;--accent:#f0a030;--green:#3dd68c;--red:#e85454;--blue:#4da8da}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{color:var(--accent);text-decoration:none}a:hover{color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px}
.back{font-size:.9rem;color:var(--muted);margin-bottom:16px;display:inline-block}
h1{font-size:2rem;font-weight:800;margin-bottom:4px}h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:20px}
.group{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.group h2{font-size:1.3rem;font-weight:700;margin-bottom:4px}.group h2 .emoji{margin-right:6px}
.group .cnt{font-size:.78rem;color:var(--accent);margin-bottom:8px}
.group .desc{font-size:.92rem;color:var(--muted);line-height:1.6;margin-bottom:12px}
.members{display:flex;gap:8px;flex-wrap:wrap}
.member{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.85rem;font-weight:600;display:block;color:inherit;transition:border-color .2s}
.member:hover{border-color:var(--accent)}
.member .type{font-size:.6rem;color:var(--muted);text-transform:uppercase;display:block;margin-top:1px}
</style>
</head>
<body>
<script src="cards-data.js"></script>
<div class="wrap">
<a class="back" href="index.html">← Back to CurioQuant</a>
<h1>🎭 Collector <span>Groups</span></h1>
<div class="sub">QuantBot has identified 7 distinct collector archetypes based on buying patterns, hold times, and card preferences.</div>
<div id="groups"></div>
</div>
<script>
document.getElementById('groups').innerHTML = GROUPS.map(g => {
  const members = HOLDERS.filter(h => h.group === g.name);
  return `<div class="group" style="display:grid;grid-template-columns:180px 1fr;gap:20px;align-items:start">
    <div style="text-align:center">${g.card_img ? `<img src="${g.card_img}" alt="${g.name}" style="width:100%;max-width:180px;border-radius:8px;border:1px solid #2a2b33">` : ''}</div>
    <div>
      <h2><span class="emoji">${g.emoji}</span>${g.name}</h2>
      <div class="cnt">${g.count} known wallets · ${members.length} profiled</div>
      <div class="desc">${g.desc}</div>
      <div class="members">${members.map(m => `<a class="member" href="collector.html?id=${m.id}">${m.name}<span class="type">${m.type} · ${m.cards.length} cards · ${m.total_spent}Ξ</span></a>`).join('')}</div>
    </div>
  </div>`;
}).join('');
</script>
</body></html>
