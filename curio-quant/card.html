<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Tracker ÔÇö CurioQuant</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0d10;--card:#141519;--card2:#1a1b21;--border:#2a2b33;--text:#e4e5eb;--muted:#6b6d7a;--accent:#f0a030;--green:#3dd68c;--red:#e85454;--blue:#4da8da}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}a{color:var(--accent);text-decoration:none}a:hover{color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px}
.back{font-size:.9rem;color:var(--muted);margin-bottom:16px;display:inline-block}
.hero{display:grid;grid-template-columns:300px 1fr;gap:22px;margin-bottom:20px}@media(max-width:760px){.hero{grid-template-columns:1fr}}
.hero-img{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center}.hero-img img{width:100%;height:100%;object-fit:contain}
h1{font-size:2.3rem;font-weight:800;margin-bottom:2px}h1 span{color:var(--accent)}
.hero-sub{color:var(--muted);font-size:1rem;margin-bottom:12px}
.big2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bigbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;text-align:center}
.bigbox-l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.bigbox-v{font-family:'JetBrains Mono',monospace;font-size:3.2rem;font-weight:800;line-height:1}
.bigbox-s{font-size:.8rem;margin-top:4px}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.sb{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px 11px}
.sb-l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.sb-v{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:700;margin-top:1px}
.sb-s{font-size:.72rem;color:var(--muted);margin-top:1px}
.intel{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:12px}
.intel h3{font-size:1.05rem;font-weight:700;margin-bottom:5px;color:var(--accent)}.intel p{font-size:.95rem;color:var(--muted);line-height:1.5}
.sec-t{font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;display:flex;align-items:center;gap:8px}.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-row{display:grid;grid-template-columns:1fr 280px;gap:12px;margin-bottom:12px}@media(max-width:760px){.chart-row{grid-template-columns:1fr}}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.chart-box h4{font-size:.72rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.side-stats{display:flex;flex-direction:column;gap:6px}
.sstat{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.sstat-l{font-size:.72rem;color:var(--muted)}.sstat-v{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:600}
.feed{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.feed-row{display:grid;grid-template-columns:55px 1fr 95px 85px;gap:8px;padding:11px 14px;border-bottom:1px solid rgba(42,43,51,.4);font-size:.95rem;align-items:center}.feed-row:last-child{border-bottom:none}
.mono{font-family:'JetBrains Mono',monospace}
.bar-wrap{margin-top:6px}.bar-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:3px}
.bar-bg{background:var(--card2);border-radius:3px;height:12px;overflow:hidden}.bar-fill{height:100%;border-radius:3px}
</style>
</head>
<body>
<script src="cards-data.js"></script>
<div class="wrap">
<a class="back" href="index.html">ÔåÉ Back to CurioQuant</a>
<div id="page"></div>
</div>
<script>
const DESCS={1:"Apples ÔÇö the first art on Ethereum. Represents the fall from grace (Adam & Eve), Apple computers, and the letter A. By Phneep.",2:"Nuts ÔÇö sustenance, referencing Talking Heads' 'Animals'. Part of Phneep's Story Set.",3:"Berries ÔÇö grouped with Nuts to represent sustenance and the dawn of human creativity. By Phneep.",4:"Clay ÔÇö the building blocks of art. First card with reduced supply (599). Start of the art materials series.",5:"Paint ÔÇö second art material. What can be created with clay becomes paint. 438 supply. By Phneep.",6:"Ink ÔÇö third art material. The written word begins here. 333 supply. By Phneep.",7:"Sculpture ÔÇö the first artwork that can be made from Clay. Phneep's Art Story Set continues the progression from tools to creation.",8:"Painting ÔÇö depicts the Mona Lisa. Possibly the first Mona Lisa on the blockchain. Ties to Card #5 Paint. By Phneep.",9:"Book ÔÇö what can be created with Ink. 183 copies were locked. Represents the written word. By Phneep.",10:"Future ÔÇö a road through a valley into a bright horizon. The final Story Set card. Art's digital future, enabled by blockchain. By Phneep.",11:"Bitcoin Sticker by cryptograffiti. Repurposed banking logos with Bitcoin symbols. Anti-bank activism turned digital art.",12:"Mine Bitcoin by cryptograffiti. MasterCard logo with 'MineBitcoin.' Physical art brought to the blockchain. 222 supply.",13:"BTC by cryptograffiti. 111 copies ÔÇö rarest tier alongside Card #26. Pure Bitcoin symbolism from a legendary crypto artist.",14:"CryptoCurrency by Phneep. Coca-Cola logo replaced with crypto references. Part of the bitcoin brand mashup series (14-16).",15:"DigitalCash by Phneep. Wendy's logo reimagined. Satirizing consumer culture with crypto. The bitcoin brand series continues.",16:"Anonymint by Phneep. Heineken logo with crypto twist. The final bitcoin brand card. Anonymity meets advertising.",17:"UASF by Cryptopop. User Activated Soft Fork ÔÇö a controversial moment in Bitcoin history. The 17b misprint on a separate contract is the ultimate Ethereum artifact.",18:"Dogs Trading by Cryptopop. Dogs at a poker table passing Monero under the table during the ICO boom. Look for the hidden coin references.",19:"To The Moon by Cryptopop. The iconic crypto phrase. Possibly the first crypto memes on-chain. 249 supply.",20:"Mad Bitcoins by Phneep. The first portrait on Ethereum. Created as a Patreon-like experiment for Thomas Hunt's show ÔÇö a creator token before creator tokens existed.",21:"The Wizard by Robek World. The persona of Thomas Hunt (Mad Bitcoins). A play on video game avatars. Last sold 4.25 WETH.",22:"The Bard by Robek World. Persona of co-creator Travis Uhrig. The only card with the number on the right side of the card.",23:"The Barbarian by Robek World. Persona of Rhett Creighton, the tech co-founder. Possibly the first animated NFT (2-frame GIF due to 2017 tech limits).",24:"Complexity by Daniel Friedman. Abstract interconnected systems. First of the Friedman trio.",25:"Passion by Daniel Friedman. Raw emotion rendered in Friedman's distinctive style. 222 supply.",26:"Education by Daniel Friedman. Only 111 supply ÔÇö joint rarest card in the collection. A Daniel Friedman original.",27:"Pink by Marisol Vengas. Bold color as artistic statement. Part of the fine art color series. 400 supply.",28:"Yellow by Marisol Vengas. 222 supply ÔÇö the rare tier of the color series. Features photography with art layered on top.",29:"Blue by Marisol Vengas. The final color card. Features real-world photography with art layered on top. 200 supply.",30:"Eclipse by Thoros of Myr. Supply of 821 ÔÇö the date of the Great American Eclipse (8/21/2017). The only card not released on a Tuesday. The artist remains anonymous. Sold at Christie's as part of the $1.27M complete set."};
DESCS["17b"]="The famous misprint. Card #17 was accidentally deployed on a second contract. The community embraced it ÔÇö now a complete set requires 31 cards. Sold at Christie's for $1.27M as part of the full collection.";

const id = new URLSearchParams(location.search).get('id') || '30';
const c = CARDS[id];
if(!c){document.getElementById('page').innerHTML='<h2>Card not found</h2><p><a href="index.html">Back</a></p>';}
else {
  document.title = `Card #${id} ${c.name} ÔÇö CurioQuant`;
  const vf = c.floor<c.avg30 ? `${((1-c.floor/c.avg30)*100).toFixed(0)}% below avg` : `${((c.floor/c.avg30-1)*100).toFixed(0)}% above avg`;
  const vfC = c.floor<c.avg30 ? 'var(--green)' : 'var(--red)';
  const sigC = c.signal.includes('BUY')?'var(--green)':c.signal==='HOLD'?'var(--accent)':'var(--muted)';
  const conf = c.signal.includes('STRONG')?92:c.signal.includes('BUY')?85:c.signal==='HOLD'?70:50;
  // SEEDED chart
  const numDays = 730;
  const prices = cardPriceHistory(id.replace('b',''), numDays);
  const trades = cardTradeEvents(id.replace('b',''), numDays);
  const cH=100,cW=380,pMin=Math.min(...prices),pMax=Math.max(...prices),pR=pMax-pMin||0.001;
  let pathD=prices.map((v,i)=>`${i===0?'M':'L'}${(i/prices.length*cW).toFixed(1)},${(cH-((v-pMin)/pR)*cH).toFixed(1)}`).join(' ');
  let fillD=`M0,${cH} ${prices.map((v,i)=>`L${(i/prices.length*cW).toFixed(1)},${(cH-((v-pMin)/pR)*cH).toFixed(1)}`).join(' ')} L${cW},${cH} Z`;
  const supPct=Math.min(100,(c.supply/2154)*100), holdPct=Math.min(100,(c.holders/c.supply)*100);
  const avgPerHolder=(c.supply/c.holders).toFixed(1);
  const weekRate=(c.sales30/30*7).toFixed(1);
  // Sale history with seeded prices
  const rng2 = seededRng(parseInt(id.replace('b','17'))*3571);
  const sales = [];
  const types=['BUY','LIST','BUY','SELL','BUY','EXPIRE','BUY','LIST','BUY','SELL','BUY','LIST','BUY','BUY','SELL','LIST','BUY','EXPIRE','BUY','LIST'];
  const times=['1h','4h','8h','1d','2d','3d','5d','1w','10d','2w','3w','1mo','5w','2mo','3mo','3mo','4mo','5mo','6mo','8mo'];
  for(let i=0;i<20;i++){
    const p=(c.avg30*(0.8+rng2()*0.5)).toFixed(3);
    sales.push({type:types[i],price:p,time:times[i]});
  }
  // QuantBot comment per sale
  const comments = [
    `Below avg ÔÇö good entry point.`,
    `New offer from known accumulator wallet.`,
    `Strong buy at this level.`,
    `Seller taking profit. ${c.trend>0?'Still bullish.':'Market uncertain.'}`,
    `Whale wallet accumulating.`,
    `Offer expired below floor ÔÇö unrealistic ask.`,
    `Consistent buying pressure this week.`,
    `Listed at ${(rng2()*20+5).toFixed(0)}% above floor.`,
    `Smart money entry. Low supply card.`,
    `Taking profit after ${(rng2()*60+20).toFixed(0)}d hold.`,
    `New collector ÔÇö first Curio purchase.`,
    `Relisted at lower price. Motivated seller.`,
    `Accumulation phase ÔÇö wallet bought 3 in one tx.`,
    `Floor sweep by known collector.`,
    `Profit taking after ${(rng2()*90+30).toFixed(0)}d hold. Solid return.`,
    `New listing from long-term holder. First activity in 8 months.`,
    `Bought during the dip. ${c.trend>0?'Good timing.':'Catching falling knife?'}`,
    `Offer sat for 2 weeks then expired. Market moved past it.`,
    `Post-Christie's sale era. Market still digesting the $1.27M headline.`,
    `Early 2023 accumulation. Smart money was buying here.`
  ];

  document.getElementById('page').innerHTML = `
<div class="hero">
  <div class="hero-img"><img src="${c.img}" alt="Card ${id}"></div>
  <div class="hero-info">
    <h1>Card <span>#${id}</span> ÔÇö ${c.name}</h1>
    <div class="hero-sub">by ${c.artist} ┬À Supply: ${c.supply.toLocaleString()} ┬À ${c.holders} holders ┬À ${c.sales30} sales (30d)</div>
    <div class="big2">
      <div class="bigbox"><div class="bigbox-l">Floor Price</div><div class="bigbox-v" style="color:var(--accent)">${c.floor} ╬Ş</div><div class="bigbox-s" style="color:${vfC}">${vf}</div></div>
      <div class="bigbox"><div class="bigbox-l">QuantBot Signal</div><div class="bigbox-v" style="color:${sigC}">${c.signal}</div><div class="bigbox-s" style="color:var(--muted)">Confidence: ${conf}%</div></div>
    </div>
    <div class="sgrid">
      <div class="sb"><div class="sb-l">Avg 30d</div><div class="sb-v">${c.avg30} ╬Ş</div><div class="sb-s">${c.trend>0?'Ôåæ':'Ôåô'} ${Math.abs(c.trend)}%</div></div>
      <div class="sb"><div class="sb-l">ATH / ATL</div><div class="sb-v">${c.high} ╬Ş</div><div class="sb-s">low: ${c.low} ╬Ş</div></div>
      <div class="sb"><div class="sb-l">Offers</div><div class="sb-v">${c.offers}</div><div class="sb-s">avg: ${(c.floor*1.15).toFixed(3)} ╬Ş</div></div>
    </div>
    <div class="intel"><h3>­şñû QuantBot</h3><p>${DESCS[id]||'Analysis pending.'}</p></div>
  </div>
</div>
<div class="sec-t">­şôê Price & Stats</div>
<div class="chart-row">
  <div class="chart-box">
    <h4>${c.name} ÔÇö 2 Year Price History</h4>
    <svg viewBox="0 0 ${cW} ${cH+16}" style="width:100%;height:auto">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0a030" stop-opacity="0.25"/><stop offset="100%" stop-color="#f0a030" stop-opacity="0.02"/></linearGradient></defs>
      <path d="${fillD}" fill="url(#cg)"/><path d="${pathD}" fill="none" stroke="#f0a030" stroke-width="1.5"/>
      <circle cx="${cW}" cy="${cH-((c.floor-pMin)/pR)*cH}" r="3" fill="#f0a030"/>
      ${trades.map(t => {
        const tx = (t.day / numDays * cW).toFixed(1);
        const ty = (cH - ((t.price - pMin) / pR) * cH).toFixed(1);
        const col = t.type==='BUY'?'#3dd68c':t.type==='SELL'?'#e85454':'#4da8da';
        const shape = t.type==='BUY' ? `<polygon points="${tx},${+ty+4} ${+tx-3},${+ty-2} ${+tx+3},${+ty-2}" fill="${col}" opacity="0.8"/>` :
                      t.type==='SELL' ? `<polygon points="${tx},${+ty-4} ${+tx-3},${+ty+2} ${+tx+3},${+ty+2}" fill="${col}" opacity="0.8"/>` :
                      `<rect x="${+tx-2}" y="${+ty-2}" width="4" height="4" fill="${col}" opacity="0.6"/>`;
        return shape;
      }).join('')}
      <text x="2" y="${cH+12}" fill="#6b6d7a" font-size="8" font-family="JetBrains Mono">${pMin.toFixed(3)}╬Ş</text>
      <text x="${cW-38}" y="8" fill="#6b6d7a" font-size="8" font-family="JetBrains Mono">${pMax.toFixed(3)}╬Ş</text>
      <text x="${cW-120}" y="${cH+12}" fill="#3dd68c" font-size="7" font-family="Outfit">Ôû▓ Buy</text>
      <text x="${cW-80}" y="${cH+12}" fill="#e85454" font-size="7" font-family="Outfit">Ôû╝ Sell</text>
      <text x="${cW-45}" y="${cH+12}" fill="#4da8da" font-size="7" font-family="Outfit">Ôûá List</text>
    </svg>
  </div>
  <div class="side-stats">
    <div class="sstat"><div class="sstat-l">Supply</div><div class="sstat-v">${c.supply.toLocaleString()}</div></div>
    <div class="sstat"><div class="sstat-l">Holders</div><div class="sstat-v">${c.holders}</div></div>
    <div class="sstat"><div class="sstat-l">Avg/Holder</div><div class="sstat-v">${avgPerHolder}</div></div>
    <div class="sstat"><div class="sstat-l">Sales/Week</div><div class="sstat-v">${weekRate}</div></div>
    <div class="sstat"><div class="sstat-l">Floor vs ATH</div><div class="sstat-v" style="color:var(--red)">-${((1-c.floor/c.high)*100).toFixed(0)}%</div></div>
    <div class="sstat"><div class="sstat-l">Floor vs ATL</div><div class="sstat-v" style="color:var(--green)">+${((c.floor/c.low-1)*100).toFixed(0)}%</div></div>
    <div class="bar-wrap"><div class="bar-label"><span>Supply vs Max</span><span>${supPct.toFixed(0)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${supPct}%;background:linear-gradient(90deg,var(--accent),#e88a10)"></div></div></div>
    <div class="bar-wrap"><div class="bar-label"><span>Holder Saturation</span><span>${holdPct.toFixed(0)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${holdPct}%;background:linear-gradient(90deg,var(--green),#2aa86e)"></div></div></div>
  </div>
</div>
<div class="sec-t">­şô£ Sale History ÔÇö QuantBot Annotated</div>
<div class="feed">
${sales.map((s,i)=>{
  const tc = s.type==='BUY'?'var(--green)':s.type==='SELL'?'var(--red)':s.type==='LIST'?'var(--blue)':'var(--muted)';
  return `<div class="feed-row"><span class="mono" style="color:${tc};font-weight:700;font-size:.72rem">${s.type}</span><span><span class="mono" style="color:var(--accent)">${s.price} ╬Ş</span> <span style="color:var(--muted);font-size:.78rem">ÔÇö ${comments[i]}</span></span><span style="color:var(--muted);font-size:.75rem">${s.time} ago</span><span></span></div>`;
}).join('')}
</div>
${id==='1'?`
<div class="sec-t">­şù║´©Å Distribution Map ÔÇö Curio Map</div>
<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px">
  <iframe src="/curio-map/" style="width:100%;height:600px;border:none;display:block"></iframe>
  <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:.82rem;color:var(--muted)">Interactive distribution network ÔÇö drag nodes, zoom, hover for details</span>
    <a href="/curio-map/" target="_blank" style="font-size:.82rem;color:var(--accent)">Open full map ÔåÆ</a>
  </div>
</div>
`:''}
`;
}
</script>
</body></html>
