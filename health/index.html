<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1n2 Health Check</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--green:#34d399;--amber:#fbbf24;--red:#f87171;--accent:#22d3ee}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:13px;padding:20px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:1.3rem;margin-bottom:4px}h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:.75rem;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}
.card h3{font-size:.8rem;margin-bottom:8px;color:var(--accent)}
.row{display:flex;justify-content:space-between;padding:3px 0;font-size:.75rem;border-bottom:1px solid rgba(30,41,59,.4)}
.row:last-child{border:none}
.row .v{font-weight:700}
.ok{color:var(--green)}.warn{color:var(--amber)}.err{color:var(--red)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.dot.g{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.r{background:var(--red)}.dot.y{background:var(--amber)}
.log{font-size:.7rem;color:var(--muted);padding:2px 0;border-bottom:1px solid rgba(30,41,59,.3)}
.ft{text-align:center;color:var(--muted);font-size:.7rem;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.ft a{color:var(--accent)}
.section-label{font-size:.7rem;color:var(--muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.05em}
.score{font-size:1.8rem;font-weight:700;color:var(--green);margin:4px 0}
.score.warn{color:var(--amber)}.score.bad{color:var(--red)}
@media(max-width:768px){.grid,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>💚 <span>1n2.org</span> Health Check</h1>
<p class="sub" id="ts">Checking all systems...</p>

<div class="grid">
  <div class="card">
    <h3>📊 Data Labs Stats</h3>
    <div id="stats-block"><div class="row"><span>Loading...</span></div></div>
  </div>
  <div class="card">
    <h3>⚡ System Score</h3>
    <div id="score-block"><div class="score" id="score-num">—</div><div id="score-detail" style="color:var(--muted);font-size:.75rem">checking...</div></div>
  </div>
</div>

<p class="section-label">🌐 Live Sites</p>
<div class="grid3">
  <div class="card">
    <h3>Core</h3>
    <div id="sites-core"></div>
  </div>
  <div class="card">
    <h3>Curio Ecosystem</h3>
    <div id="sites-curio"></div>
  </div>
  <div class="card">
    <h3>Media & Content</h3>
    <div id="sites-media"></div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h3>🎮 Games & Tools</h3>
    <div id="sites-games"></div>
  </div>
  <div class="card">
    <h3>📁 Data Exports</h3>
    <div id="exports-block"></div>
  </div>
</div>

<p class="section-label">🔧 Cron Jobs (last run)</p>
<div class="grid">
  <div class="card">
    <h3>Daily Pipeline</h3>
    <div id="jobs-block"></div>
  </div>
  <div class="card">
    <h3>📝 Recent Logs</h3>
    <div id="logs-block"></div>
  </div>
</div>

<div class="ft"><a href="/">← 1n2.org</a> · auto-refresh every 60s · <span id="refresh-in">60</span>s</div>
</div>

<script>
const BASE = '';
let totalOk = 0, totalChecked = 0;

// Site groups
const SITES = {
  core: [
    ['/', '1n2.org homepage'],
    ['dashboarder/', 'Dashboarder'],
    ['thunt-data-labs/web/', 'Data Labs'],
    ['daily-logs/', 'Daily Logs'],
    ['ai-usage/', 'AI Usage'],
    ['health/', 'Health (this page)'],
  ],
  curio: [
    ['curiocharts/', 'CurioCharts'],
    ['curio-quant/', 'CurioQuant'],
    ['curio-map/', 'Curio Map'],
    ['curio-wiki/', 'Curio Wiki'],
    ['curioarchive/', 'Curio Archive'],
    ['curio-atlas/', 'Curio Atlas'],
    ['curiohub/', 'Curio Hub'],
    ['curioreview/', 'Curio Review'],
    ['curio-oracle/', 'Curio Oracle'],
    ['curio-terminal/', 'Curio Terminal'],
  ],
  media: [
    ['thomashuntfilms/', 'Thomas Hunt Films'],
    ['tbg-mirrors/', 'TBG Mirrors'],
    ['wcn-podcast/', 'WCN Podcast'],
    ['my-youtube/', 'My YouTube'],
    ['commentzor/', 'Commentzor'],
    ['medialog/', 'MediaLog'],
    ['tweetster/', 'Tweetster'],
    ['all-media-tracker/', 'All Media'],
    ['thunt-wiki/', 'THunt Wiki'],
    ['briefsmith/', 'Briefsmith'],
    ['google-news/', 'Google News'],
    ['daily-thunt/', 'Daily THunt'],
  ],
  games: [
    ['madpatrol/', 'Mad Patrol'],
    ['madpatrol2/', 'Mad Patrol 2'],
    ['madpatrol3/', 'Mad Patrol 3'],
    ['bitcoin-vision/', 'Bitcoin Vision'],
    ['bitcoin-trains/', 'Bitcoin Trains'],
    ['bitcoinships/', 'Bitcoin Ships'],
    ['mb-games/', 'MB Games'],
    ['madninja/', 'Mad Ninja'],
    ['agent-hangar/', 'Agent Hangar'],
    ['workflows/', 'Workflows'],
  ]
};

const EXPORTS = [
  {path: 'thunt-data-labs/web/stats.json', label: 'stats.json'},
  {path: 'curioarchive/data/live-data.json', label: 'curio live-data.json'},
  {path: 'curio-atlas/data/network.json', label: 'curio network.json'},
  {path: 'curiohub/data/hub-data.json', label: 'hub-data.json'},
  {path: 'curio-oracle/data/oracle-data.json', label: 'oracle-data.json'},
  {path: 'commentzor/data.json', label: 'commentzor data.json'},
  {path: 'tbg-mirrors/data.json', label: 'tbg data.json'},
  {path: 'wcn-podcast/data.json', label: 'wcn data.json'},
];

const JOBS = [
  'Data Labs Collect','Comment Fetcher','MediaLog RSS',
  'ThomasHuntFilms','WCN+TBG Podcasts','Curio Data Hub',
  'CurioQuant','Curio Map','Curio Wiki','Curio Charts',
  'Article Archive','Dashboarder','Morning Summary',
  'Daily Logs','AI Usage','Homepage Stats',
  'City News','Entertainment','Ego Search','Tweetster',
  'Deploy to Droplet','GitHub Auto-Commit'
];

function statusHtml(path, label, ok, status) {
  const cls = ok ? 'ok' : 'err';
  const dot = ok ? 'g' : 'r';
  const stat = ok ? (status || '200') : (status || 'fail');
  return `<div class="row"><span><span class="dot ${dot}"></span>${label}</span><span class="v ${cls}">${stat}</span></div>`;
}

async function checkSite(path) {
  try {
    const r = await fetch('/' + path, {method:'HEAD', cache:'no-store'});
    totalChecked++; if(r.ok) totalOk++;
    return {ok: r.ok, status: r.status};
  } catch(e) {
    totalChecked++;
    return {ok: false, status: 'err'};
  }
}

async function checkExport(path) {
  try {
    const r = await fetch('/' + path, {cache:'no-store'});
    if (!r.ok) return {ok: false, age: null};
    const text = await r.text();
    let age = null;
    try {
      const d = JSON.parse(text);
      const ts = d.generated_at || d.last_updated || d.date || d.timestamp || null;
      if (ts) {
        const diff = (Date.now() - new Date(ts)) / 3600000;
        age = diff < 25 ? `${diff.toFixed(0)}h ago` : `${(diff/24).toFixed(0)}d ago`;
      }
    } catch(e) {}
    return {ok: true, age};
  } catch(e) {
    return {ok: false, age: null};
  }
}

async function loadStats() {
  try {
    const r = await fetch('/thunt-data-labs/web/stats.json', {cache:'no-store'});
    const d = await r.json();
    const yt = d.datasets?.youtube?.tables || {};
    const cu = d.datasets?.curio?.tables || {};
    const ar = d.datasets?.articles?.tables || {};
    const tw = d.datasets?.tweets?.tables || {};
    const md = d.datasets?.media?.tables || {};
    document.getElementById('stats-block').innerHTML = `
      <div class="row"><span>Total Records</span><span class="v ok">${(d.total_records||0).toLocaleString()}</span></div>
      <div class="row"><span>YouTube Videos</span><span class="v ok">${(yt.videos||0).toLocaleString()}</span></div>
      <div class="row"><span>YouTube Comments</span><span class="v ok">${(yt.comments||0).toLocaleString()}</span></div>
      <div class="row"><span>Curio Sales</span><span class="v ok">${(cu.sales||0).toLocaleString()}</span></div>
      <div class="row"><span>Articles</span><span class="v ok">${(ar.articles||0).toLocaleString()}</span></div>
      <div class="row"><span>Tweets</span><span class="v ok">${(tw.tweets||0).toLocaleString()}</span></div>
      <div class="row"><span>Movies</span><span class="v ok">${(md.movies||0).toLocaleString()}</span></div>
      <div class="row"><span>Books</span><span class="v ok">${(md.books||0).toLocaleString()}</span></div>
      <div class="row"><span>DB Size</span><span class="v ok">${d.db_size_mb||'?'}MB</span></div>
      <div class="row"><span>Generated</span><span class="v" style="color:var(--muted)">${(d.generated_at||'?').substring(0,16)}</span></div>
    `;
  } catch(e) {
    document.getElementById('stats-block').innerHTML = '<div class="row"><span>stats.json</span><span class="v err">fail</span></div>';
  }
}

async function checkAllSites() {
  for (const [group, sites] of Object.entries(SITES)) {
    const el = document.getElementById('sites-' + group);
    let html = '';
    for (const [path, label] of sites) {
      const {ok, status} = await checkSite(path);
      html += statusHtml(path, label, ok, status);
    }
    el.innerHTML = html;
  }
}

async function checkExports() {
  const el = document.getElementById('exports-block');
  let html = '';
  for (const exp of EXPORTS) {
    const {ok, age} = await checkExport(exp.path);
    const dot = ok ? 'g' : 'r';
    const cls = ok ? 'ok' : 'err';
    const val = ok ? (age || '✓') : 'fail';
    html += `<div class="row"><span><span class="dot ${dot}"></span>${exp.label}</span><span class="v ${cls}">${val}</span></div>`;
  }
  el.innerHTML = html;
}

function renderJobs() {
  const el = document.getElementById('jobs-block');
  const half = Math.ceil(JOBS.length / 2);
  let html = '';
  for (const job of JOBS.slice(0, half)) {
    html += `<div class="row"><span><span class="dot y"></span>${job}</span><span class="v warn">1:00AM</span></div>`;
  }
  el.innerHTML = html;
  // Put rest in logs block
  const el2 = document.getElementById('logs-block');
  let html2 = '';
  for (const job of JOBS.slice(half)) {
    html2 += `<div class="row"><span><span class="dot y"></span>${job}</span><span class="v warn">1:00AM</span></div>`;
  }
  html2 += `<div class="row" style="margin-top:8px"><span>Next cron</span><span class="v ok" id="next-cron">...</span></div>`;
  el2.innerHTML = html2;
  // Calculate next 1 AM
  const now = new Date();
  const next = new Date(now); next.setHours(1,0,0,0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const diff = Math.round((next - now) / 60000);
  const hrs = Math.floor(diff / 60), mins = diff % 60;
  document.getElementById('next-cron').textContent = `${hrs}h ${mins}m`;
}

function updateScore() {
  const pct = totalChecked > 0 ? Math.round(totalOk * 100 / totalChecked) : 0;
  const el = document.getElementById('score-num');
  el.textContent = pct + '%';
  el.className = 'score' + (pct >= 90 ? '' : pct >= 70 ? ' warn' : ' bad');
  document.getElementById('score-detail').textContent = `${totalOk}/${totalChecked} sites responding`;
}

async function runAll() {
  document.getElementById('ts').textContent = 'Last checked: ' + new Date().toLocaleTimeString();
  totalOk = 0; totalChecked = 0;
  await Promise.all([loadStats(), checkAllSites(), checkExports()]);
  renderJobs();
  updateScore();
}

runAll();

// Countdown + auto refresh
let countdown = 60;
setInterval(() => {
  countdown--;
  document.getElementById('refresh-in').textContent = countdown;
  if (countdown <= 0) { countdown = 60; runAll(); }
}, 1000);
</script>
</body>
</html>
