<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commentzor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #12121a;
  --bg-hover: #1a1a28;
  --bg-active: #222235;
  --border: #2a2a3d;
  --border-glow: #4a3aff44;
  --text-primary: #e8e6f0;
  --text-secondary: #8886a0;
  --text-dim: #5a587a;
  --accent-1: #6c5ce7;
  --accent-2: #fd79a8;
  --accent-3: #00cec9;
  --accent-4: #fdcb6e;
  --accent-5: #55efc4;
  --gradient-hero: linear-gradient(135deg, #6c5ce7 0%, #fd79a8 50%, #00cec9 100%);
  --gradient-card: linear-gradient(145deg, #12121a 0%, #0d0d14 100%);
  --shadow-glow: 0 0 30px rgba(108, 92, 231, 0.15);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Background Texture ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,92,231,0.08), transparent),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(253,121,168,0.06), transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,206,201,0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Header ─── */
.header {
  position: relative;
  z-index: 10;
  padding: 32px 40px 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: var(--gradient-hero);
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-size: 22px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  color: white;
  box-shadow: var(--shadow-glow);
  flex-shrink: 0;
}

.logo-text h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -0.5px;
  background: var(--gradient-hero);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.logo-text p {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}

.header-stats {
  display: flex;
  gap: 24px;
  padding-bottom: 4px;
}

.header-stat {
  text-align: right;
}

.header-stat .value {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.header-stat .label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* ─── Navigation ─── */
.nav-area {
  position: relative;
  z-index: 10;
  padding: 24px 40px 0;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}

.nav-tab {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  position: relative;
  bottom: -1px;
}

.nav-tab:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
}

.nav-tab.active {
  color: var(--accent-1);
  border-bottom-color: var(--accent-1);
}

.nav-tab.channel-tab {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-tab .tab-avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  object-fit: cover;
}

.nav-tab .tab-count {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  background: var(--bg-active);
  padding: 2px 6px;
  border-radius: 10px;
  color: var(--text-dim);
}

/* ─── Main Content ─── */
.main {
  position: relative;
  z-index: 10;
  padding: 24px 40px 60px;
}

/* ─── Comment Grid (9x9 style) ─── */
.comment-grid-section h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 4px;
}

.comment-grid-section .subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.comment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.comment-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: all 0.25s;
  cursor: default;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.comment-card:hover {
  border-color: var(--accent-1);
  box-shadow: var(--shadow-glow);
  transform: translateY(-2px);
}

.comment-card .card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.comment-card .avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg-active);
  flex-shrink: 0;
  object-fit: cover;
}

.comment-card .author {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.comment-card .likes {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent-2);
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.comment-card .text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-word;
}

.comment-card .card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  font-size: 10px;
  color: var(--text-dim);
}

.comment-card .video-ref {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}

.comment-card .video-ref a {
  color: var(--text-dim);
  text-decoration: none;
}

.comment-card .video-ref a:hover {
  color: var(--accent-1);
}

.shuffle-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 20px;
}

.shuffle-btn:hover {
  border-color: var(--accent-1);
  box-shadow: var(--shadow-glow);
}

/* ─── Stats Page ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
  margin-top: 24px;
}

.stat-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.stat-panel h3 {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.stat-panel .big-number {
  font-family: 'Space Mono', monospace;
  font-size: 36px;
  font-weight: 700;
  background: var(--gradient-hero);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stat-panel .big-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

.leaderboard {
  list-style: none;
}

.leaderboard li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.leaderboard li:last-child { border-bottom: none; }

.leaderboard .rank {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  width: 24px;
  text-align: right;
}

.leaderboard .lb-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-active);
  object-fit: cover;
  flex-shrink: 0;
}

.leaderboard .lb-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
}

.leaderboard .lb-count {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent-4);
}

.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bar-label {
  font-size: 11px;
  color: var(--text-secondary);
  width: 80px;
  text-align: right;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg-active);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  position: relative;
}

.bar-fill::after {
  content: attr(data-value);
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: white;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

.channel-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.channel-stat-card {
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  padding: 16px;
  display: flex;
  gap: 12px;
  align-items: center;
  transition: all 0.2s;
  cursor: pointer;
}

.channel-stat-card:hover {
  background: var(--bg-active);
}

.channel-stat-card .ch-thumb {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-active);
}

.channel-stat-card .ch-info { flex: 1; }

.channel-stat-card .ch-name {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 2px;
}

.channel-stat-card .ch-meta {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
}

/* ─── Videos List ─── */
.video-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 16px;
}

.video-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}

.video-row:hover {
  border-color: var(--accent-1);
}

.video-row .vid-thumb {
  width: 80px;
  height: 45px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--bg-active);
  flex-shrink: 0;
}

.video-row .vid-info { flex: 1; min-width: 0; }

.video-row .vid-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.video-row .vid-title a {
  color: var(--text-primary);
  text-decoration: none;
}

.video-row .vid-title a:hover { color: var(--accent-1); }

.video-row .vid-meta {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  margin-top: 2px;
}

/* ─── Search ─── */
.search-area {
  position: relative;
  margin-bottom: 20px;
}

.search-area input {
  width: 100%;
  max-width: 480px;
  padding: 12px 16px 12px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

.search-area input:focus {
  border-color: var(--accent-1);
}

.search-area .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 16px;
}

/* ─── Empty / Loading States ─── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state h3 {
  font-family: 'Instrument Serif', serif;
  font-size: 24px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.6;
}

.empty-state code {
  display: inline-block;
  background: var(--bg-card);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent-3);
  margin: 2px 0;
}

.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
}

.loading::after {
  content: '';
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent-1);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .header { padding: 20px; flex-direction: column; align-items: flex-start; }
  .header-stats { align-self: flex-start; }
  .nav-area { padding: 16px 20px 0; }
  .nav-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .main { padding: 16px 20px 40px; }
  .comment-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
}

/* ─── Top Liked Comments ─── */
.top-comment-card {
  padding: 14px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}

.top-comment-card .tc-text {
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.top-comment-card .tc-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
}

.top-comment-card .tc-likes {
  color: var(--accent-2);
  font-family: 'Space Mono', monospace;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-area">
    <div class="logo-icon">C</div>
    <div class="logo-text">
      <h1>Commentzor</h1>
      <p>YouTube Comment Database</p>
    </div>
  </div>
  <div class="header-stats" id="headerStats"></div>
</div>

<nav class="nav-area">
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    <button class="nav-tab" data-tab="stats" onclick="switchTab('stats')">Stats</button>
    <!-- Channel tabs inserted dynamically -->
  </div>
</nav>

<main class="main" id="mainContent">
  <div class="loading">Loading Commentzor</div>
</main>

<script>
// ─── State ─────────────────────────────────────────────────
let state = {
  channels: [],
  stats: null,
  currentTab: 'overview',
  currentChannelComments: [],
  searchResults: [],
};

const ACCENT_COLORS = ['#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#55efc4','#e17055','#74b9ff','#a29bfe'];

function fmt(n) {
  if (n == null) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 2592000) return Math.floor(diff/86400) + 'd ago';
  if (diff < 31536000) return Math.floor(diff/2592000) + 'mo ago';
  return Math.floor(diff/31536000) + 'y ago';
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── API Calls ─────────────────────────────────────────────
async function apiGet(path) {
  try {
    const resp = await fetch('/api/' + path);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('API Error:', e);
    return null;
  }
}

// ─── Initialization ────────────────────────────────────────
async function init() {
  state.stats = await apiGet('stats');
  state.channels = await apiGet('channels');

  if (!state.stats || !state.channels) {
    renderEmpty();
    return;
  }

  renderHeaderStats();
  renderChannelTabs();
  switchTab('overview');
}

function renderHeaderStats() {
  const s = state.stats;
  document.getElementById('headerStats').innerHTML = `
    <div class="header-stat">
      <div class="value">${fmt(s.total_comments)}</div>
      <div class="label">Comments</div>
    </div>
    <div class="header-stat">
      <div class="value">${fmt(s.total_videos)}</div>
      <div class="label">Videos</div>
    </div>
    <div class="header-stat">
      <div class="value">${fmt(s.total_authors)}</div>
      <div class="label">Authors</div>
    </div>
  `;
}

function renderChannelTabs() {
  const tabs = document.getElementById('navTabs');
  const existingChannelTabs = tabs.querySelectorAll('.channel-tab');
  existingChannelTabs.forEach(t => t.remove());

  if (state.channels) {
    state.channels.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab channel-tab';
      btn.dataset.tab = 'channel_' + ch.channel_id;
      btn.onclick = () => switchTab('channel_' + ch.channel_id);
      const avatar = ch.thumbnail_url ? `<img class="tab-avatar" src="${escHtml(ch.thumbnail_url)}" alt="">` : '';
      btn.innerHTML = `${avatar} ${escHtml(ch.channel_name)} <span class="tab-count">${fmt(ch.cmt_count)}</span>`;
      tabs.appendChild(btn);
    });
  }
}

// ─── Tab Switching ─────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;

  // Update active tab
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  const main = document.getElementById('mainContent');

  if (tab === 'overview') {
    renderOverview(main);
  } else if (tab === 'stats') {
    renderStatsPage(main);
  } else if (tab.startsWith('channel_')) {
    const channelId = tab.replace('channel_', '');
    renderChannelPage(main, channelId);
  }
}

// ─── Overview Page ─────────────────────────────────────────
function renderOverview(el) {
  const s = state.stats;
  if (!s || s.total_comments === 0) {
    el.innerHTML = renderEmptyState();
    return;
  }

  let html = `
    <div class="search-area">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search all comments..." id="searchInput" oninput="handleSearch(this.value)">
    </div>
    <div id="searchResults"></div>
    <div class="comment-grid-section">
      <h2>Random Comments Across All Channels</h2>
      <p class="subtitle">A sampling from ${fmt(s.total_comments)} comments across ${s.total_channels} channel${s.total_channels!==1?'s':''}</p>
      <button class="shuffle-btn" onclick="shuffleAllComments()">&#127922; Shuffle Comments</button>
      <div class="comment-grid" id="overviewGrid"></div>
    </div>
  `;

  el.innerHTML = html;
  shuffleAllComments();
}

async function shuffleAllComments() {
  const grid = document.getElementById('overviewGrid');
  if (!grid) return;
  grid.innerHTML = '<div class="loading">Shuffling</div>';

  // Pick a random channel and get its comments
  if (!state.channels || state.channels.length === 0) return;

  let allComments = [];
  for (const ch of state.channels) {
    const data = await apiGet(`channels/${ch.channel_id}/random?count=27`);
    if (data) allComments = allComments.concat(data);
  }

  // Shuffle
  for (let i = allComments.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allComments[i], allComments[j]] = [allComments[j], allComments[i]];
  }

  renderCommentGrid(grid, allComments.slice(0, 81));
}

// ─── Channel Page ──────────────────────────────────────────
async function renderChannelPage(el, channelId) {
  const ch = state.channels.find(c => c.channel_id === channelId);
  if (!ch) { el.innerHTML = '<div class="empty-state">Channel not found</div>'; return; }

  el.innerHTML = `
    <div class="comment-grid-section">
      <h2>${escHtml(ch.channel_name)}</h2>
      <p class="subtitle">${fmt(ch.cmt_count)} comments across ${fmt(ch.vid_count)} videos</p>
      <button class="shuffle-btn" onclick="shuffleChannelComments('${channelId}')">&#127922; Shuffle Comments</button>
      <div class="comment-grid" id="channelGrid"></div>
    </div>
    <div style="margin-top: 40px;">
      <h2 style="font-family: 'Instrument Serif', serif; font-size: 22px; margin-bottom: 16px;">Top Videos by Comments</h2>
      <div id="channelVideos" class="video-list"><div class="loading">Loading videos</div></div>
    </div>
  `;

  shuffleChannelComments(channelId);
  loadChannelVideos(channelId);
}

async function shuffleChannelComments(channelId) {
  const grid = document.getElementById('channelGrid');
  if (!grid) return;
  grid.innerHTML = '<div class="loading">Loading comments</div>';

  const data = await apiGet(`channels/${channelId}/random?count=81`);
  if (!data) { grid.innerHTML = '<div class="empty-state">No comments yet</div>'; return; }

  renderCommentGrid(grid, data);
}

async function loadChannelVideos(channelId) {
  const container = document.getElementById('channelVideos');
  const data = await apiGet(`channels/${channelId}/videos?sort=comments`);
  if (!data || data.length === 0) { container.innerHTML = '<div class="empty-state">No videos</div>'; return; }

  container.innerHTML = data.slice(0, 30).map(v => `
    <div class="video-row">
      ${v.thumbnail_url ? `<img class="vid-thumb" src="${escHtml(v.thumbnail_url)}" alt="">` : '<div class="vid-thumb"></div>'}
      <div class="vid-info">
        <div class="vid-title"><a href="https://youtube.com/watch?v=${v.video_id}" target="_blank">${escHtml(v.title)}</a></div>
        <div class="vid-meta">${fmt(v.actual_comments)} comments &middot; ${fmt(v.view_count)} views &middot; ${fmt(v.like_count)} likes</div>
      </div>
    </div>
  `).join('');
}

// ─── Comment Grid Renderer ────────────────────────────────
function renderCommentGrid(container, comments) {
  if (!comments || comments.length === 0) {
    container.innerHTML = '<div class="empty-state">No comments to display</div>';
    return;
  }

  container.innerHTML = comments.map((c, i) => {
    const avatarHtml = c.author_avatar
      ? `<img class="avatar" src="${escHtml(c.author_avatar)}" alt="">`
      : `<div class="avatar"></div>`;

    return `
      <div class="comment-card" style="animation-delay: ${Math.min(i * 0.02, 1)}s">
        <div class="card-header">
          ${avatarHtml}
          <span class="author">${escHtml(c.author_name)}</span>
          ${c.like_count > 0 ? `<span class="likes">&#9829; ${fmt(c.like_count)}</span>` : ''}
        </div>
        <div class="text">${escHtml(c.text_original)}</div>
        <div class="card-footer">
          <span class="video-ref"><a href="https://youtube.com/watch?v=${c.video_id}" target="_blank">${escHtml((c.video_title||'').substring(0,40))}</a></span>
          <span>${timeAgo(c.published_at)}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ─── Stats Page ────────────────────────────────────────────
function renderStatsPage(el) {
  const s = state.stats;
  if (!s || s.total_comments === 0) {
    el.innerHTML = renderEmptyState();
    return;
  }

  const maxChannelComments = Math.max(...(s.channels || []).map(c => c.cmt_count || 0), 1);
  const maxTopVideo = Math.max(...(s.top_videos || []).map(v => v.actual_comments || 0), 1);

  el.innerHTML = `
    <h2 style="font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 4px;">Statistics</h2>
    <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 24px;">Deep dive into your YouTube comment data</p>

    <div class="stats-grid">
      <!-- Big Numbers -->
      <div class="stat-panel">
        <h3>Total Comments</h3>
        <div class="big-number">${s.total_comments.toLocaleString()}</div>
        <div class="big-label">across ${s.total_channels} channel${s.total_channels!==1?'s':''}</div>
      </div>
      <div class="stat-panel">
        <h3>Unique Authors</h3>
        <div class="big-number">${s.total_authors.toLocaleString()}</div>
        <div class="big-label">${s.total_comments > 0 ? (s.total_comments / Math.max(s.total_authors,1)).toFixed(1) : 0} avg comments per author</div>
      </div>
      <div class="stat-panel">
        <h3>Comment Breakdown</h3>
        <div class="big-number">${s.total_top_level.toLocaleString()}</div>
        <div class="big-label">top-level comments</div>
        <div style="margin-top: 8px; font-family: 'Space Mono', monospace; font-size: 14px; color: var(--accent-2);">+ ${s.total_replies.toLocaleString()}</div>
        <div class="big-label">replies</div>
      </div>

      <!-- Channel Bar Chart -->
      <div class="stat-panel" style="grid-column: 1 / -1">
        <h3>Comments by Channel</h3>
        <div class="channel-card-grid">
          ${(s.channels || []).map((ch, i) => `
            <div class="channel-stat-card" onclick="switchTab('channel_${ch.channel_id}')">
              ${ch.thumbnail_url ? `<img class="ch-thumb" src="${escHtml(ch.thumbnail_url)}" alt="">` : '<div class="ch-thumb"></div>'}
              <div class="ch-info">
                <div class="ch-name">${escHtml(ch.channel_name)}</div>
                <div class="ch-meta">${fmt(ch.cmt_count)} comments &middot; ${fmt(ch.vid_count)} videos</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Top Commenters -->
      <div class="stat-panel">
        <h3>Top Commenters</h3>
        <ul class="leaderboard">
          ${(s.top_authors || []).slice(0, 15).map((a, i) => `
            <li>
              <span class="rank">#${i+1}</span>
              ${a.author_avatar ? `<img class="lb-avatar" src="${escHtml(a.author_avatar)}" alt="">` : '<div class="lb-avatar"></div>'}
              <span class="lb-name">${escHtml(a.author_name)}</span>
              <span class="lb-count">${fmt(a.total_comments)}</span>
            </li>
          `).join('')}
        </ul>
      </div>

      <!-- Most Commented Videos -->
      <div class="stat-panel">
        <h3>Most Commented Videos</h3>
        <div class="bar-chart">
          ${(s.top_videos || []).slice(0, 10).map((v, i) => `
            <div class="bar-row">
              <span class="bar-label" title="${escHtml(v.title)}">${escHtml((v.title||'').substring(0,15))}...</span>
              <div class="bar-track">
                <div class="bar-fill" data-value="${fmt(v.actual_comments)}" style="width: ${(v.actual_comments/maxTopVideo*100).toFixed(1)}%; background: ${ACCENT_COLORS[i % ACCENT_COLORS.length]};"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Most Liked Comments -->
      <div class="stat-panel">
        <h3>Most Liked Comments</h3>
        ${(s.top_liked_comments || []).slice(0, 8).map(c => `
          <div class="top-comment-card">
            <div class="tc-text">${escHtml(c.text_original)}</div>
            <div class="tc-meta">
              <span>${escHtml(c.author_name)} on ${escHtml((c.video_title||'').substring(0,30))}</span>
              <span class="tc-likes">&#9829; ${fmt(c.like_count)}</span>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Comments by Day of Week -->
      <div class="stat-panel">
        <h3>Comments by Day of Week</h3>
        <div class="bar-chart">
          ${(s.by_day_of_week || []).map((d, i) => {
            const maxDay = Math.max(...(s.by_day_of_week||[]).map(x => x.count), 1);
            return `
              <div class="bar-row">
                <span class="bar-label">${d.day_name || 'N/A'}</span>
                <div class="bar-track">
                  <div class="bar-fill" data-value="${fmt(d.count)}" style="width: ${(d.count/maxDay*100).toFixed(1)}%; background: ${ACCENT_COLORS[i % ACCENT_COLORS.length]};"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- Comment Length Stats -->
      <div class="stat-panel">
        <h3>Comment Length</h3>
        <div style="display: flex; gap: 24px;">
          <div>
            <div class="big-number" style="font-size: 28px;">${Math.round(s.avg_comment_length?.avg_length || 0)}</div>
            <div class="big-label">avg characters</div>
          </div>
          <div>
            <div style="font-family: 'Space Mono', monospace; font-size: 28px; color: var(--accent-3);">${fmt(s.avg_comment_length?.max_length || 0)}</div>
            <div class="big-label">longest comment</div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      ${(s.timeline && s.timeline.length > 0) ? `
        <div class="stat-panel" style="grid-column: 1 / -1">
          <h3>Comments Over Time</h3>
          <div style="display: flex; align-items: flex-end; gap: 2px; height: 120px; padding-top: 8px;">
            ${(() => {
              const maxMonth = Math.max(...s.timeline.map(t => t.count), 1);
              return s.timeline.slice(-36).map(t => {
                const pct = (t.count / maxMonth * 100).toFixed(1);
                return `<div title="${t.month}: ${fmt(t.count)} comments" style="flex:1; background: var(--accent-1); border-radius: 2px 2px 0 0; height: ${pct}%; min-width: 4px; opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8"></div>`;
              }).join('');
            })()}
          </div>
          <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'Space Mono', monospace;">
            <span>${s.timeline.slice(-36)[0]?.month || ''}</span>
            <span>${s.timeline[s.timeline.length-1]?.month || ''}</span>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

// ─── Search ────────────────────────────────────────────────
let searchTimeout;
function handleSearch(query) {
  clearTimeout(searchTimeout);
  if (query.length < 2) {
    document.getElementById('searchResults').innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(async () => {
    const results = await apiGet('search?q=' + encodeURIComponent(query));
    const container = document.getElementById('searchResults');
    if (!results || results.length === 0) {
      container.innerHTML = '<p style="color: var(--text-dim); padding: 12px 0;">No results found.</p>';
      return;
    }
    container.innerHTML = `
      <p style="color: var(--text-dim); font-size: 12px; margin-bottom: 12px;">${results.length} result${results.length!==1?'s':''}</p>
      <div class="comment-grid" style="margin-bottom: 30px;">
        ${results.slice(0, 27).map((c, i) => `
          <div class="comment-card" style="animation-delay: ${i * 0.02}s">
            <div class="card-header">
              <div class="avatar"></div>
              <span class="author">${escHtml(c.author_name)}</span>
              ${c.like_count > 0 ? `<span class="likes">&#9829; ${fmt(c.like_count)}</span>` : ''}
            </div>
            <div class="text">${escHtml(c.text_original)}</div>
            <div class="card-footer">
              <span class="video-ref"><a href="https://youtube.com/watch?v=${c.video_id}" target="_blank">${escHtml((c.video_title||'').substring(0,40))}</a></span>
              <span>${escHtml(c.channel_name)}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }, 300);
}

// ─── Empty State ───────────────────────────────────────────
function renderEmptyState() {
  return `
    <div class="empty-state">
      <div class="empty-icon">&#128172;</div>
      <h3>No Comments Yet</h3>
      <p>
        Your comment database is empty. Use the CLI tool to start gathering comments:
        <br><br>
        <code>cd tools/</code><br>
        <code>export YOUTUBE_API_KEY="your_key"</code><br>
        <code>python3 gather.py --add-channel @YourChannel</code><br>
        <code>python3 gather.py --gather-all</code>
        <br><br>
        Then start the web server:
        <br>
        <code>python3 server.py</code>
      </p>
    </div>
  `;
}

function renderEmpty() {
  document.getElementById('mainContent').innerHTML = renderEmptyState();
}

// ─── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
