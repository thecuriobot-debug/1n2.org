<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Ships 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
:root { color-scheme: only light; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #1a0e08; display: flex; align-items: center; justify-content: center; }
#frame {
  position: relative; width: 100vw; height: 100vh; max-width: 100%; max-height: 100%;
  background: #1a0e08;
  border: 12px solid #2a1a0d;
  border-image: linear-gradient(135deg, #5a3a1a, #8a6a3a, #5a3a1a, #3a2210) 1;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.8);
  box-sizing: border-box;
}
canvas { display: block; width: 100%; height: 100%; touch-action: none; }
#loading {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #1a0e08; color: #c8a878; z-index: 10;
  font-family: 'Noto Serif JP', serif; font-size: 1.3rem; gap: 8px;
}
#loading .sub { font-size: 0.8rem; color: #8a6a4a; }
</style>
</head>
<body>
<div id="frame">
  <div id="loading">
    <div>波と船</div>
    <div class="sub">Loading Bitcoin price data...</div>
  </div>
  <canvas id="game" aria-label="Bitcoin Ships 3"></canvas>
</div>
<script src="main.js"></script>
</body>
</html>
