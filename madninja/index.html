<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MadNinja</title>
    <style>
      :root {
        --bg-top: #090d1c;
        --bg-bottom: #1a1831;
        --panel: #111422;
        --text: #f5f7ff;
        --accent: #ffcc33;
        --danger: #ff5f6d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2f5a 0%, var(--bg-top) 40%, #05060d 100%);
        color: var(--text);
        font-family: "Courier New", Courier, monospace;
      }

      .shell {
        width: min(95vw, 980px);
        display: grid;
        gap: 14px;
      }

      .title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
      }

      h1 {
        margin: 0;
        font-size: clamp(1rem, 2.4vw, 1.8rem);
        letter-spacing: 0.04em;
        color: var(--accent);
        text-transform: uppercase;
      }

      .hint {
        font-size: 0.8rem;
        opacity: 0.85;
      }

      .crt-frame {
        background: #000;
        border: 4px solid #2b304f;
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 0 0 2px #171b2e, 0 20px 40px rgba(0, 0, 0, 0.35);
      }

      canvas {
        display: block;
        width: 512px;
        height: 480px;
        max-width: 100%;
        max-height: 75vh;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        margin: 0 auto;
        border: 2px solid #3a456a;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 8px;
        padding: 10px;
        border: 1px solid #2b304f;
        background: linear-gradient(180deg, rgba(30, 35, 57, 0.75), rgba(12, 14, 24, 0.75));
        border-radius: 6px;
        font-size: 0.78rem;
      }

      .controls strong {
        color: var(--accent);
      }

      .warn {
        color: #ffc3c9;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="title">
        <h1>MadNinja</h1>
        <div class="hint">Expanded Build: 10 Stages</div>
      </header>

      <section class="crt-frame">
        <canvas id="game" width="256" height="240" aria-label="Game canvas"></canvas>
      </section>

      <section class="controls">
        <div><strong>Move:</strong> Arrow Keys or A/D</div>
        <div><strong>Run:</strong> Shift</div>
        <div><strong>Jump:</strong> Space / Z</div>
        <div><strong>Attack:</strong> X</div>
        <div><strong>Heavy Slash:</strong> V</div>
        <div><strong>Sub Weapon:</strong> C</div>
        <div><strong>Cycle Sub Weapon:</strong> Q</div>
        <div><strong>Next Stage:</strong> N (after Stage Clear)</div>
        <div><strong>Platforming Assist:</strong> Jump-through upper ledges</div>
        <div><strong>Cutscene Demo:</strong> Enter</div>
        <div class="warn"><strong>Goal:</strong> Reach the right edge alive.</div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
